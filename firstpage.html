<!DOCTYPE html>
<html>
<head>
    <title>Image Example</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
            font-family:Arial, sans-serif;
        }

        .image-box{
            text-align:center;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        img{
            width:300px;
            border-radius:10px;
        }
    </style>
</head>

<body>

    <div class="image-box">
        <!-- Add your image here -->
        <img src="/home/rgukt/ration/firstpage2.jpg" alt="Sample Image">

    </div>

</body>
</html>

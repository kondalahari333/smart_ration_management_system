<!DOCTYPE html>
<html>
<head>
<title>Ration Card Registration</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #2e7d32, #66bb6a, #81c784, #a5d6a7);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}

@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.form-box{
    background:white;
    padding:40px;
    width:400px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    text-align:center;
    opacity:0;
    transform:translateY(50px);
    animation:floatIn 1s forwards;
}

@keyframes floatIn {
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{ color:#2e7d32; }

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{ background:#1b5e20; }

.error{
    color:red;
    font-size:13px;
}
</style>
</head>

<body>

<div class="form-box">
<h2>Digital Ration Card</h2>

<input type="text" id="name" placeholder="Name">
<input type="text" id="aadhaar" placeholder="Aadhaar Number (12 digits)" maxlength="12">
<input type="text" id="ration" placeholder="Ration Card Number (min 8 chars)">
<input type="text" id="phone" placeholder="Phone Number (10 digits)" maxlength="10">
<input type="number" id="family" placeholder="Family Size (1-20)" min="1" max="20">
<input type="text" id="address" placeholder="Address">

<div class="error" id="errorMsg"></div>

<button onclick="saveData()">Submit</button>
</div>

<script>
function saveData(){

    let name=document.getElementById("name").value.trim();
    let aadhaar=document.getElementById("aadhaar").value.trim();
    let ration=document.getElementById("ration").value.trim();
    let phone=document.getElementById("phone").value.trim();
    let family=parseInt(document.getElementById("family").value.trim());
    let address=document.getElementById("address").value.trim();
    let error=document.getElementById("errorMsg");

    error.innerHTML="";

    if(!/^[A-Za-z ]+$/.test(name)){
        error.innerHTML="Name should contain only letters.";
        return;
    }

    if(!/^[0-9]{12}$/.test(aadhaar)){
        error.innerHTML="Aadhaar must be exactly 12 digits.";
        return;
    }

    if(ration.length < 8){
        error.innerHTML="Ration Card number must be at least 8 characters.";
        return;
    }

    if(!/^[0-9]{10}$/.test(phone)){
        error.innerHTML="Phone number must be exactly 10 digits.";
        return;
    }

    if(isNaN(family) || family < 1 || family > 20){
        error.innerHTML="Family size must be between 1 and 20.";
        return;
    }

    if(address.length < 5){
        error.innerHTML="Address must be at least 5 characters.";
        return;
    }

    localStorage.setItem("name",name);
    localStorage.setItem("aadhaar",aadhaar);
    localStorage.setItem("ration",ration);
    localStorage.setItem("phone",phone);
    localStorage.setItem("family",family);
    localStorage.setItem("address",address);

    alert("Registration Successful!");
    window.location.href="page3.html";
}
</script>

</body>
</html>

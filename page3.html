<!DOCTYPE html>
<html>
<head>
<title>Smart Ration Dashboard</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:linear-gradient(to right,#2e7d32,#66bb6a);
}
.header{
    background:white;
    color:green;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logout{
    background:red;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}
.container{ padding:20px; }
.tabs{ display:flex; gap:10px; margin-bottom:20px; }
.tab-btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
.active{ background:#1b5e20; color:white; }
.inactive{ background:#388e3c; color:white; }
.section{
    display:none;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
.show{ display:block; }
.progress{
    width:100%;
    background:#eee;
    border-radius:30px;
    overflow:hidden;
    height:22px;
    margin-bottom:5px;
}
.progress-bar{
    height:100%;
    width:0%;
    color:white;
    font-size:12px;
    line-height:22px;
    text-align:center;
    font-weight:bold;
    border-radius:30px;
}
.rice{background:linear-gradient(45deg,#2e7d32,#66bb6a);}
.wheat{background:linear-gradient(45deg,#ef6c00,#ffb74d);}
.sugar{background:linear-gradient(45deg,#6a1b9a,#ba68c8);}
.oil{background:linear-gradient(45deg,#1565c0,#64b5f6);}
.txn{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    cursor:pointer;
}
#receiptPage{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:#f5f5f5;
    overflow:auto;
}
.receipt-box{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
<h3>Welcome, <span id="username"></span></h3>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="showSection('ration',event)">RationCard</button>
<button class="tab-btn inactive" onclick="showSection('quota',event)">Quota</button>
<button class="tab-btn inactive" onclick="showSection('history',event)">History</button>
</div>

<!-- RATION DETAILS -->
<div id="ration" class="section show">
<h3>Ration Card Details</h3>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Aadhaar:</b> <span id="aadhaar"></span></p>
<p><b>Ration Card No:</b> <span id="rationNo"></span></p>
<p><b>Phone:</b> <span id="phone"></span></p>
<p><b>Family Size:</b> <span id="family"></span></p>
<p><b>Address:</b> <span id="address"></span></p>
</div>

<!-- QUOTA -->
<div id="quota" class="section">
<h3>Monthly Quota</h3>
<div>
<p>Rice</p>
<div class="progress"><div id="riceBar" class="progress-bar rice"></div></div>
<small><span id="riceRemain"></span></small>
</div>
<div>
<p>Wheat</p>
<div class="progress"><div id="wheatBar" class="progress-bar wheat"></div></div>
<small><span id="wheatRemain"></span></small>
</div>
<div>
<p>Sugar</p>
<div class="progress"><div id="sugarBar" class="progress-bar sugar"></div></div>
<small><span id="sugarRemain"></span></small>
</div>
<div>
<p>Oil</p>
<div class="progress"><div id="oilBar" class="progress-bar oil"></div></div>
<small><span id="oilRemain"></span></small>
</div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h3>Transaction History</h3>
<div id="txnList"></div>
</div>

</div>

<!-- RECEIPT -->
<div id="receiptPage">
<div style="padding:10px;">
<button onclick="closeReceipt()">⬅ Back</button>
</div>
<div class="receipt-box">
<h2 style="text-align:center;">Digital Receipt</h2>
<p><b>Transaction ID:</b> <span id="rId"></span></p>
<p><b>Date:</b> <span id="rDate"></span></p>
<p><b>Beneficiary:</b> <span id="rName"></span></p>
<p><b>Card No:</b> <span id="rCard"></span></p>
<hr>
<h3>Items</h3>
<div id="rItems"></div>
<p style="color:green;">✔ Verified Digital Receipt</p>
</div>
</div>

<script>

/* LOAD USER DATA FROM PAGE2 */
function loadUser(){
    let name = localStorage.getItem("name");
    if(!name){
        alert("No registration data found!");
        window.location="page2.html";
        return;
    }

    document.getElementById("username").innerText = name;
    document.getElementById("name").innerText = name;
    document.getElementById("aadhaar").innerText = localStorage.getItem("aadhaar");
    document.getElementById("rationNo").innerText = localStorage.getItem("ration");
    document.getElementById("phone").innerText = localStorage.getItem("phone");
    document.getElementById("family").innerText = localStorage.getItem("family");
    document.getElementById("address").innerText = localStorage.getItem("address");
}

loadUser();

/* TAB SWITCH */
function showSection(id,e){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
    document.getElementById(id).classList.add("show");

    document.querySelectorAll(".tab-btn").forEach(b=>{
        b.classList.remove("active");
        b.classList.add("inactive");
    });
    e.target.classList.add("active");

    if(id==="quota") startQuota();
    if(id==="history") loadTransactions();
}

/* QUOTA CALCULATION */
let family=parseInt(localStorage.getItem("family"))||1;
const per={rice:5,wheat:2,sugar:1,oil:1};

let totals={
rice:family*per.rice,
wheat:family*per.wheat,
sugar:family*per.sugar,
oil:family*per.oil
};

let taken={
rice:Math.floor(totals.rice*0.6),
wheat:Math.floor(totals.wheat*0.4),
sugar:Math.floor(totals.sugar*0.5),
oil:Math.floor(totals.oil*0.3)
};

function animateBar(item,total,taken,unit){
let bar=document.getElementById(item+"Bar");
let remain=document.getElementById(item+"Remain");
let percent=(taken/total)*100;
bar.style.width=percent+"%";
bar.innerText=Math.floor(percent)+"%";
remain.innerText=(total-taken)+" "+unit+" Remaining";
}

function startQuota(){
animateBar("rice",totals.rice,taken.rice,"kg");
animateBar("wheat",totals.wheat,taken.wheat,"kg");
animateBar("sugar",totals.sugar,taken.sugar,"kg");
animateBar("oil",totals.oil,taken.oil,"L");
}

/* HISTORY */
let transactions=[
{id:"TXN-001",date:"10 Feb 2026",items:{Rice:10,Wheat:5,Sugar:2,Oil:1}},
{id:"TXN-002",date:"18 Feb 2026",items:{Rice:15,Wheat:6,Sugar:3,Oil:2}}
];

function loadTransactions(){
let list=document.getElementById("txnList");
list.innerHTML="";
transactions.forEach((t,i)=>{
let div=document.createElement("div");
div.className="txn";
div.innerHTML=`<b>${t.id}</b><br>${t.date}`;
div.onclick=()=>openReceipt(i);
list.appendChild(div);
});
}

function openReceipt(i){
let t=transactions[i];
document.getElementById("receiptPage").style.display="block";
document.getElementById("rId").innerText=t.id;
document.getElementById("rDate").innerText=t.date;
document.getElementById("rName").innerText=localStorage.getItem("name");
document.getElementById("rCard").innerText=localStorage.getItem("ration");

let html="";
for(let k in t.items){
html+=`<p>${k} : ${t.items[k]}</p>`;
}
document.getElementById("rItems").innerHTML=html;
}

function closeReceipt(){
document.getElementById("receiptPage").style.display="none";
}

/* LOGOUT */
function logout(){
localStorage.clear();
window.location="index.html";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Smart Ration - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    overflow:hidden;
}

.main{
    display:flex;
    height:100vh;
}

/* LEFT SIDE */
.left{
    flex:1;
    position:relative;
    background:
        linear-gradient(rgba(255,153,51,0.6),
                        rgba(255,255,255,0.6),
                        rgba(19,136,8,0.6)),
        url("https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg") no-repeat center;
    background-size:contain;
    display:flex;
    justify-content:center;
    align-items:center;
}

.left h1{
    position:absolute;
    bottom:40px;
    color:#000080;
    font-size:26px;
    font-weight:bold;
}

/* RIGHT SIDE */
.right{
    flex:1;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(135deg,#1b5e20,#43a047,#66bb6a);
}

/* LOGIN BOX */
.container{
    background-color: rgba(255,255,255,0.9);
    padding:30px;
    width:350px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    text-align:center;
}

.logo{
    width:90px;
    margin-bottom:10px;
}

h2{
    color:#2E7D32;
    margin-bottom:20px;
}

/* ROLE BUTTONS */
.role-buttons{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.role-btn{
    width:100px;
    padding:12px 5px;
    border-radius:10px;
    border:2px solid #c8e6c9;
    cursor:pointer;
    transition:0.3s;
    text-align:center;
    background:#f1f8e9;
}

.role-btn i{
    font-size:26px;
    color:#2E7D32;
    display:block;
    margin-bottom:5px;
}

.role-btn span{
    font-size:14px;
    font-weight:bold;
    color:#2E7D32;
}

.role-btn.active{
    background:#2E7D32;
}

.role-btn.active i,
.role-btn.active span{
    color:white;
}

/* INPUT STYLE */
.input-box{
    position:relative;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #c8e6c9;
    font-size:14px;
}

input:focus{
    border-color:#2E7D32;
    outline:none;
    box-shadow:0 0 10px rgba(46,125,50,0.4);
}

/* Eye Icon */
.toggle-password{
    position:absolute;
    right:15px;
    top:18px;
    cursor:pointer;
    color:#2E7D32;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2E7D32;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1B5E20;
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="main">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>Smart Public Distribution System</h1>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="container">

            <img src="logo.png" class="logo" alt="Ration Logo">

            <h2>Smart Ration System</h2>

            <div class="role-buttons">
                <div class="role-btn active" data-role="admin" onclick="selectRole(this)">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </div>

                <div class="role-btn" data-role="fps" onclick="selectRole(this)">
                    <i class="fas fa-store"></i>
                    <span>FPS</span>
                </div>

                <div class="role-btn" data-role="user" onclick="selectRole(this)">
                    <i class="fas fa-user"></i>
                    <span>User</span>
                </div>
            </div>

            <input type="text" id="username" placeholder="Enter Username" required>

            <!-- Password with show/hide -->
            <div class="input-box">
                <input type="password" id="password" minlength="8" placeholder="Enter Password (Min 8 characters)" required>
                <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
            </div>

            <button onclick="login()">Sign In</button>

        </div>

    </div>

</div>

<script>
var selectedRole = "admin";

function selectRole(element){
    var buttons = document.querySelectorAll(".role-btn");
    buttons.forEach(btn => btn.classList.remove("active"));

    element.classList.add("active");
    selectedRole = element.getAttribute("data-role");

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
}

/* Show / Hide Password */
function togglePassword(){
    var pwd = document.getElementById("password");
    var icon = document.querySelector(".toggle-password");

    if(pwd.type === "password"){
        pwd.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        pwd.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

function login() {
    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value;

    if(username === "" || password === ""){
        alert("Please enter username and password");
        return;
    }

    if(password.length < 8){
        alert("Password must be at least 8 characters");
        return;
    }

    localStorage.setItem("username", username);
    localStorage.setItem("role", selectedRole);

    if(selectedRole === "admin"){
        window.location.href = "admin.html";
    }
    else if(selectedRole === "user"){
        window.location.href = "page3.html";
    }
    else if(selectedRole === "fps"){
        window.location.href = "fps.html";
    }
}
</script>

</body>
</html>
